<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<!-- Optional CDNs: Highlight.js, Marked, Mermaid, ECharts (gracefully degrades offline) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js" defer></script>
<style>
  :root {
    --navy: #0B1D33;
    --navy-light: #142E4C;
    --blue: #1565C0;
    --blue-deep: #0D47A1;
    --blue-light: #42A5F5;
    --blue-pale: #BBDEFB;
    --blue-wash: #E3F2FD;
    --teal: #0D9488;
    --teal-light: #14B8A6;
    --teal-pale: #CCFBF1;
    --teal-wash: #F0FDFA;
    --violet: #7C3AED;
    --violet-pale: #EDE9FE;
    --violet-wash: #F5F3FF;
    --gray-900: #111827;
    --gray-700: #374151;
    --gray-600: #4B5563;
    --gray-500: #6B7280;
    --gray-400: #9CA3AF;
    --gray-300: #D1D5DB;
    --gray-200: #E5E7EB;
    --gray-100: #F3F4F6;
    --gray-50: #F9FAFB;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --amber: #D97706;
    --amber-light: #FEF3C7;
    --green: #059669;
    --green-light: #D1FAE5;
    --cover-bg: linear-gradient(145deg, #020817 0%, #052047 38%, #0B3A78 68%, #06172B 100%);
    --cover-blob1: rgba(37,99,235,0.18);
    --cover-blob2: rgba(20,184,166,0.16);
    --cover-grid: rgba(255,255,255,0.045);
    --cover-text-main: #ffffff;
    --cover-text-dim: rgba(255,255,255,0.86);
    --cover-text-label: rgba(255,255,255,0.74);
    --cover-accent: #5EEAD4;
    --cover-accent-grad: linear-gradient(90deg, #FFFFFF 0%, #5EEAD4 48%, #BFDBFE 100%);
    --cover-accent-grad-b: linear-gradient(90deg, #5EEAD4, #BFDBFE);
    --cover-accent-shadow: rgba(94,234,212,0.35);
    --cover-highlight: #FDE68A;
    --cover-highlight-shadow: rgba(253,230,138,0.32);
    --cover-border: rgba(255,255,255,0.18);
    --cover-text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    --font-body: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    --font-display: var(--font-body);
    --font-mono: "SF Mono", Menlo, Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { font-family: var(--font-body); background: var(--viewport-bg, #0a0a0a); overflow: hidden; -webkit-font-smoothing: antialiased; transition: background 0.5s ease; }

  /* ===========================================
     FIXED 16:9 STAGE (mandatory base)
     Every slide is authored at 1920x1080. JavaScript scales the whole
     stage with a single transform to fit the window, so the layout is
     identical on every screen: smaller screens see the same slide scaled
     down (letterboxed), never reflowed. All slide-internal sizes are
     fixed pixels at the 1920x1080 design size. Do not add media queries,
     vw/vh units, or clamp() to slide content.
     =========================================== */
  .deck-viewport { position: fixed; inset: 0; overflow: hidden; background: var(--viewport-bg, #0a0a0a); transition: background 0.5s ease; }
  .deck { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; overflow: hidden; transform-origin: 0 0; }
  .slide { position: absolute; inset: 0; width: 1920px; height: 1080px; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 54px 115px; overflow: hidden; visibility: hidden; opacity: 0; pointer-events: none; transition: opacity 0.5s ease, visibility 0s linear 0.5s; }
  .slide.active { visibility: visible; opacity: 1; pointer-events: auto; z-index: 1; transition: opacity 0.5s ease, visibility 0s; }
  /* Escape hatch for dense slides: enables vertical scrolling. Prefer splitting content across slides. */
  .slide.scroll { overflow-y: auto; justify-content: flex-start; }

  /* Presentation chrome lives outside the stage, so it is never scaled. */
  .nav { position: fixed; bottom: calc(24px * var(--chrome-scale, 1)); left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: calc(6px * var(--chrome-scale, 1)); z-index: 100; flex-wrap: wrap; max-width: 80vw; justify-content: center; }
  .nav .dot { width: calc(8px * var(--chrome-scale, 1)); height: calc(8px * var(--chrome-scale, 1)); border-radius: 50%; border: calc(2px * var(--chrome-scale, 1)) solid var(--navy); background: transparent; cursor: pointer; transition: all 0.3s; padding: 0; }
  .nav .dot.on { background: var(--navy); transform: scale(1.25); }
  .page-num { position: fixed; bottom: calc(24px * var(--chrome-scale, 1)); right: calc(32px * var(--chrome-scale, 1)); font-size: calc(12px * var(--chrome-scale, 1)); color: var(--gray-400); z-index: 100; }
  .nav-arrows { position: fixed; bottom: calc(24px * var(--chrome-scale, 1)); left: calc(32px * var(--chrome-scale, 1)); display: flex; gap: calc(8px * var(--chrome-scale, 1)); z-index: 100; }
  .nav-arrows button, .fs-btn { width: calc(32px * var(--chrome-scale, 1)); height: calc(32px * var(--chrome-scale, 1)); border-radius: 50%; border: calc(1.5px * var(--chrome-scale, 1)) solid var(--gray-200); background: rgba(255,255,255,0.95); color: var(--gray-500); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
  .nav-arrows button svg, .fs-btn svg { width: calc(14px * var(--chrome-scale, 1)); height: calc(14px * var(--chrome-scale, 1)); }
  .nav-arrows button:hover, .fs-btn:hover { border-color: var(--navy); color: var(--navy); }
  .fs-btn { position: fixed; top: calc(24px * var(--chrome-scale, 1)); left: calc(32px * var(--chrome-scale, 1)); z-index: 100; }
  .speaker-btn { position: fixed; top: calc(24px * var(--chrome-scale, 1)); left: calc(72px * var(--chrome-scale, 1)); z-index: 100; width: calc(32px * var(--chrome-scale, 1)); height: calc(32px * var(--chrome-scale, 1)); border-radius: 50%; border: calc(1.5px * var(--chrome-scale, 1)) solid var(--gray-200); background: rgba(255,255,255,0.95); color: var(--gray-500); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
  .speaker-btn:hover { border-color: var(--navy); color: var(--navy); }
  .speaker-btn svg { width: calc(14px * var(--chrome-scale, 1)); height: calc(14px * var(--chrome-scale, 1)); }
  .notes { display: none; }
  .watermark { position: fixed; top: calc(24px * var(--chrome-scale, 1)); right: calc(32px * var(--chrome-scale, 1)); font-size: calc(11px * var(--chrome-scale, 1)); letter-spacing: 0.5px; color: var(--gray-400); z-index: 100; font-weight: 500; }

  .slide-label { font-size: 16px; letter-spacing: 4px; color: var(--blue); text-transform: uppercase; margin-bottom: 15px; font-weight: 700; }
  .slide-title { font-family: var(--font-display); font-size: 54px; font-weight: 800; color: var(--gray-900); line-height: 1.35; text-align: center; margin-bottom: 13px; }
  .slide-subtitle { font-size: 22px; color: var(--gray-500); line-height: 1.7; text-align: center; max-width: 1420px; margin-bottom: 22px; }
  .em { color: var(--blue); font-weight: 700; }
  .em-teal { color: var(--teal); font-weight: 700; }
  .em-red { color: var(--red); font-weight: 700; }
  .em-amber { color: var(--amber); font-weight: 700; }

  /* SVG vector animations */
  @keyframes dash14 { to { stroke-dashoffset: -28; } }
  @keyframes dash12 { to { stroke-dashoffset: -24; } }
  .flow-anim { stroke-dasharray: 8 6; animation: dash14 1.6s linear infinite; }
  .flow-anim-slow { stroke-dasharray: 7 5; animation: dash12 2.4s linear infinite; }
  @keyframes softPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .pulse-dot { animation: softPulse 2.2s ease-in-out infinite; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .slide.active .a { animation: fadeUp 0.45s ease forwards; }
  .slide.active .a1 { animation-delay: 0.06s; opacity: 0; }
  .slide.active .a2 { animation-delay: 0.18s; opacity: 0; }
  .slide.active .a3 { animation-delay: 0.30s; opacity: 0; }
  .slide.active .a4 { animation-delay: 0.42s; opacity: 0; }
  .slide.active .a5 { animation-delay: 0.55s; opacity: 0; }
  .slide.active .a6 { animation-delay: 0.68s; opacity: 0; }

  /* Cover */
  .cover-bg { position: absolute; inset: 0; overflow: hidden; background: var(--cover-bg); }
  .cover-bg::before { content: ''; position: absolute; right: -8%; top: -15%; width: 594px; height: 594px; border-radius: 50%; background: radial-gradient(circle, var(--cover-blob1) 0%, transparent 70%); }
  .cover-bg::after { content: ''; position: absolute; left: -5%; bottom: -10%; width: 486px; height: 486px; border-radius: 50%; background: radial-gradient(circle, var(--cover-blob2) 0%, transparent 70%); }
  .cover-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--cover-grid) 1px, transparent 1px), linear-gradient(90deg, var(--cover-grid) 1px, transparent 1px); background-size: 80px 80px; }
  .cover-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .cover-logo { font-family: var(--font-display); font-size: 25px; font-weight: 700; color: var(--cover-text-dim); letter-spacing: 2px; margin-bottom: 43px; text-shadow: var(--cover-text-shadow); }
  .cover-logo span { color: var(--cover-accent); font-weight: 800; }
  .cover-title { font-family: var(--font-display); font-size: 77px; font-weight: 800; color: var(--cover-text-main); line-height: 1.35; margin-bottom: 27px; }
  .cover-title .h { background: var(--cover-accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 3px 14px rgba(0,0,0,0.45)); }
  .cover-divider { width: 80px; height: 4px; background: var(--cover-accent-grad-b); margin-bottom: 32px; box-shadow: 0 0 18px var(--cover-accent-shadow); }
  .cover-sub { font-size: 24px; color: var(--cover-text-dim); line-height: 1.9; max-width: 1190px; font-weight: 500; margin-bottom: 43px; text-shadow: var(--cover-text-shadow); }
  .cover-sub .warm { color: var(--cover-highlight); font-weight: 900; text-shadow: 0 0 16px var(--cover-highlight-shadow), var(--cover-text-shadow); }
  .cover-stats { display: flex; gap: 58px; }
  .cover-stat { display: flex; flex-direction: column; align-items: center; padding: 0 38px; border-right: 1px solid var(--cover-border); }
  .cover-stat:last-child { border-right: none; }
  .cover-stat .n { font-size: 36px; font-weight: 800; background: var(--cover-accent-grad-b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35)); }
  .cover-stat .l { font-size: 16px; color: var(--cover-text-label); margin-top: 5px; font-weight: 500; text-shadow: var(--cover-text-shadow); }

  /* Generic layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 31px; max-width: 1613px; width: 100%; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 27px; max-width: 1651px; width: 100%; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 23px; max-width: 1690px; width: 100%; }

  .card { padding: 22px 27px; border-radius: 12px; border: 1.5px solid var(--gray-200); background: #fff; text-align: left; transition: transform 0.3s, box-shadow 0.3s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
  .card .badge { display: inline-block; padding: 3px 13px; border-radius: 4px; font-size: 13px; font-weight: 700; margin-bottom: 9px; background: var(--gray-100); color: var(--gray-700); }
  .card h3 { font-size: 22px; font-weight: 800; color: var(--gray-900); margin-bottom: 9px; display: flex; align-items: center; gap: 10px; }
  .card h3 .badge { margin-bottom: 0; padding: 4px 10px; border-radius: 6px; }
  .card p { font-size: 17px; color: var(--gray-600); line-height: 1.75; }
  .card ul { list-style: none; margin-top: 7px; }
  .card li { font-size: 16px; color: var(--gray-600); padding: 3px 0 3px 23px; position: relative; line-height: 1.6; }
  .card li::before { content: ''; width: 7px; height: 7px; border-radius: 50%; position: absolute; left: 0; top: 10px; }
  .b-blue li::before { background: var(--blue); }
  .b-teal li::before { background: var(--teal); }
  .b-red li::before { background: var(--red); }
  .b-amber li::before { background: var(--amber); }

  .card.b-blue { border-top: 4px solid var(--blue); }
  .card.b-teal { border-top: 4px solid var(--teal); }
  .card.b-red { border-top: 4px solid var(--red); }
  .card.b-amber { border-top: 4px solid var(--amber); }

  .card.b-blue .badge { background: var(--blue-wash); color: var(--blue-deep); }
  .card.b-teal .badge { background: var(--teal-wash); color: var(--teal); }
  .card.b-red .badge { background: var(--red-light); color: var(--red); }
  .card.b-amber .badge { background: var(--amber-light); color: var(--amber); }

  /* Full-color filled cards */
  .card.fill-blue { border: 2px solid var(--blue); background: var(--blue-wash); }
  .card.fill-blue h3 { color: var(--blue); }
  .card.fill-teal { border: 2px solid var(--teal); background: var(--teal-wash); }
  .card.fill-teal h3 { color: var(--teal); }
  .card.fill-red { border: 2px solid var(--red); background: var(--red-light); }
  .card.fill-red h3 { color: var(--red); }
  .card.fill-amber { border: 2px solid var(--amber); background: var(--amber-light); }
  .card.fill-amber h3 { color: var(--amber); }
  .card.fill-violet { border: 2px solid var(--violet); background: var(--violet-wash); }
  .card.fill-violet h3 { color: var(--violet); }
  
  .card.fill-blue .badge { background: var(--blue); color: #fff; }
  .card.fill-teal .badge { background: var(--teal); color: #fff; }
  .card.fill-red .badge { background: var(--red); color: #fff; }
  .card.fill-amber .badge { background: var(--amber); color: #fff; }
  .card.fill-violet .badge { background: var(--violet); color: #fff; }

  .bottom-strip { margin-top: 19px; padding: 19px 58px; background: var(--navy); border-radius: 10px; max-width: 1651px; text-align: center; }
  .bottom-strip p { font-size: 20px; color: rgba(255,255,255,0.92); font-weight: 600; line-height: 1.7; }
  .bottom-strip .em { color: var(--teal-light); }
  .bottom-strip .wm { color: #fbbf24; font-weight: 800; }

  .feat-card { padding: 24px 29px; border-radius: 12px; border: 2px solid var(--gray-300); text-align: left; transition: transform 0.3s; }
  .feat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.05); }
  .feat-card h3 { font-size: 22px; font-weight: 800; color: var(--gray-900); margin-bottom: 9px; }
  .feat-card p { font-size: 17px; color: var(--gray-600); line-height: 1.75; }

  .tag { display: inline-block; padding: 3px 12px; border-radius: 4px; font-size: 13px; font-weight: 700; background: var(--gray-100); color: var(--gray-700); }

  .stack-col { display: flex; flex-direction: column; gap: 6px; }
  .stack-row { padding: 8px 13px; border-radius: 7px; font-size: 16px; font-weight: 700; text-align: center; line-height: 1.4; background: var(--gray-100); color: var(--gray-700); }
  .stack-row small { display: block; font-size: 13px; font-weight: 500; opacity: 0.8; }

  .plat-card { border-radius: 10px; border: 1.6px solid var(--gray-200); background: #fff; padding: 13px 15px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
  .plat-card h4 { font-size: 19px; font-weight: 800; color: var(--gray-900); line-height: 1.35; }
  .plat-card p { font-size: 15px; color: var(--gray-500); line-height: 1.5; }

  /* Color variants: pair with .feat-card, .badge, .tag, .stack-row */
  .feat-blue { border-color: var(--blue); }
  .feat-blue h3 { color: var(--blue); }
  .feat-teal { border-color: var(--teal); }
  .feat-teal h3 { color: var(--teal); }
  .feat-red { border-color: var(--red); }
  .feat-red h3 { color: var(--red); }
  .feat-amber { border-color: var(--amber); }
  .feat-amber h3 { color: var(--amber); }

  .badge-blue, .tag-blue { background: var(--blue-wash); color: var(--blue-deep); }
  .badge-teal, .tag-teal { background: var(--teal-wash); color: var(--teal); }
  .badge-red, .tag-red { background: var(--red-light); color: var(--red); }
  .badge-amber, .tag-amber { background: var(--amber-light); color: var(--amber); }

  .stack-blue { background: var(--blue-wash); color: var(--blue-deep); }
  .stack-teal { background: var(--teal-wash); color: var(--teal); }
  .stack-red { background: var(--red-light); color: var(--red); }
  .stack-amber { background: var(--amber-light); color: var(--amber); }
  .stack-navy { background: var(--navy); color: rgba(255,255,255,0.92); }

  /* Images */
  .slide-img { max-width: 1613px; max-height: 562px; object-fit: contain; border-radius: 10px; }
  .img-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 23px; max-width: 1651px; width: 100%; }
  .img-grid img { width: 100%; height: 281px; object-fit: cover; border-radius: 8px; display: block; }

  /* Code & tables */
  .code-block { background: var(--navy); color: #E5E7EB; border-radius: 10px; padding: 22px 31px; font-family: var(--font-mono); font-size: 17px; line-height: 1.7; text-align: left; max-width: 1613px; width: 100%; overflow-x: auto; white-space: pre; }
  .card code, li code, p code { font-family: var(--font-mono); font-size: 0.92em; background: var(--gray-100); color: var(--navy); padding: 1px 7px; border-radius: 4px; }
  .code-block code { background: none; color: inherit; padding: 0; font-size: inherit; }
  .data-table { border-collapse: collapse; width: 100%; max-width: 1613px; font-size: 17px; text-align: left; }
  .data-table th { background: var(--navy); color: #fff; padding: 11px 19px; font-weight: 700; white-space: nowrap; }
  .data-table td { padding: 10px 19px; border-bottom: 1px solid var(--gray-200); color: var(--gray-700); }
  .data-table tr:nth-child(even) td { background: var(--gray-50); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; }
  }

  /* Print to PDF: one fixed-size 16:9 slide per page, all content visible, no nav chrome */
  @page { size: 1920px 1080px; margin: 0; }
  @media print {
    html, body { width: 1920px; height: auto; overflow: visible; background: #fff; }
    .deck-viewport { position: static; overflow: visible; background: #fff; }
    .deck { position: static; width: auto; height: auto; overflow: visible; transform: none !important; }
    .slide { position: relative; inset: auto; visibility: visible; opacity: 1; pointer-events: auto; page-break-after: always; break-after: page; }
    .slide:last-of-type { page-break-after: auto; break-after: auto; }
    .slide .a, .slide .a1, .slide .a2, .slide .a3, .slide .a4, .slide .a5, .slide .a6 { opacity: 1 !important; animation: none !important; }
    .nav, .nav-arrows, .page-num, .watermark, .fs-btn { display: none !important; }
  }


  /* Themes Variables definitions */
  body.theme-cyberpunk {
    --navy: #0B1D33;
    --navy-light: #142E4C;
    --blue: #06b6d4; /* cyan */
    --blue-deep: #0891b2;
    --blue-light: #67e8f9;
    --blue-pale: rgba(6, 182, 212, 0.2);
    --blue-wash: rgba(6, 182, 212, 0.1);
    --teal: #10b981; /* emerald */
    --teal-light: #34d399;
    --teal-pale: rgba(16, 185, 129, 0.2);
    --teal-wash: rgba(16, 185, 129, 0.1);
    --violet: #d946ef; /* fuchsia */
    --violet-pale: rgba(217, 70, 239, 0.2);
    --violet-wash: rgba(217, 70, 239, 0.1);
    --gray-900: #f8fafc;
    --gray-700: #e2e8f0;
    --gray-600: #cbd5e1;
    --gray-500: #94a3b8;
    --gray-400: #64748b;
    --gray-300: #475569;
    --gray-200: #334155;
    --gray-100: #1e293b;
    --gray-50: #0f172a;
    --red: #f43f5e; /* rose */
    --red-light: rgba(244, 63, 94, 0.15);
    --amber: #fbbf24; /* yellow */
    --amber-light: rgba(251, 191, 36, 0.15);
    --green: #10b981;
    --green-light: rgba(16, 185, 129, 0.15);
    
    --cover-bg: linear-gradient(135deg, #05050d 0%, #0d0b21 50%, #15092d 100%);
    --cover-blob1: rgba(236, 72, 153, 0.15);
    --cover-blob2: rgba(6, 182, 212, 0.15);
    --cover-grid: rgba(255, 255, 255, 0.03);
    --cover-text-main: #ffffff;
    --cover-text-dim: rgba(255, 255, 255, 0.85);
    --cover-text-label: rgba(255, 255, 255, 0.65);
    --cover-accent: #06b6d4;
    --cover-accent-grad: linear-gradient(90deg, #ec4899 0%, #a855f7 50%, #06b6d4 100%);
    --cover-accent-grad-b: linear-gradient(90deg, #ec4899, #06b6d4);
    --cover-accent-shadow: rgba(6, 182, 212, 0.4);
    --cover-highlight: #facc15;
    --cover-highlight-shadow: rgba(250, 204, 21, 0.3);
    --cover-border: rgba(255, 255, 255, 0.12);
    --cover-text-shadow: 0 0 15px rgba(236, 72, 153, 0.3), 0 0 5px rgba(6, 182, 212, 0.3);

<button class="fs-btn" onclick="toggleFs()" aria-label="Toggle fullscreen" title="Fullscreen (F)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
<button class="speaker-btn" onclick="openSpeakerView()" aria-label="Speaker View" title="Speaker View (S)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20v14H2z"/><path d="M8 21h8"/><path d="M12 17v4"/></svg></button>
<div class="nav-arrows"><button onclick="go(-1)" aria-label="Previous slide"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><button onclick="go(1)" aria-label="Next slide"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button></div>
<div class="nav" id="nav"></div>
<div class="page-num" id="pageNum"></div>

<script>
  // Scale the fixed 1920x1080 stage to fit the window with one transform.
  // The deck letterboxes on phones or odd aspect ratios; it never reflows.
  const stage = document.getElementById('deck');
  function fitStage() {
    const f = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    const x = (window.innerWidth - 1920 * f) / 2;
    const y = (window.innerHeight - 1080 * f) / 2;
    stage.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(' + f + ')';
    
    // Scale navigation chrome on larger screens (upscale only, keep at least 1x for mobile touch targets)
    const chromeScale = Math.max(1, f);
    document.documentElement.style.setProperty('--chrome-scale', chromeScale);
  }
  fitStage();
  window.addEventListener('resize', fitStage);

  const slides = document.querySelectorAll('.slide');
  const N = slides.length;
  let cur = 0;
  const nav = document.getElementById('nav');
  for (let i = 0; i < N; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    d.onclick = () => jump(i);
    nav.appendChild(d);
  }
  let speakerChannel = null;
  if (typeof BroadcastChannel !== 'undefined') {
    speakerChannel = new BroadcastChannel('deck-speaker-sync');
    speakerChannel.onmessage = (e) => {
      if (e.data && e.data.action === 'go') {
        go(e.data.dir);
      }
    };
  }

  function broadcastSpeakerState() {
    if (!speakerChannel) return;
    const curSlide = slides[cur];
    const nextIdx = (cur + 1) % N;
    const nextSlide = slides[nextIdx];
    const notesEl = curSlide ? curSlide.querySelector('.notes') : null;
    
    const getTitle = (s) => s ? (s.querySelector('.slide-title')?.innerText || s.querySelector('.cover-title')?.innerText || '未命名') : '';
    
    speakerChannel.postMessage({
      slideIndex: cur + 1,
      totalSlides: N,
      notes: notesEl ? notesEl.innerHTML : '<em>暂无讲稿备注</em>',
      currentTitle: getTitle(curSlide),
      nextTitle: nextIdx === 0 ? '结束 (返回封面)' : getTitle(nextSlide),
      nextSlideId: nextSlide ? nextSlide.id : ''
    });
  }

  function openSpeakerView() {
    const win = window.open('', '_blank', 'width=900,height=600');
    if (!win) return alert('请允许弹出窗口以开启演讲者视图！');
    const deckUrl = window.location.href.split('#')[0];
    win.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>演讲者视图 (Speaker View)</title>
        <style>
          body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; height: 100vh; box-sizing: border-box; }
          .panel { background: #1e293b; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
          .timer { font-size: 32px; font-weight: 800; color: #38bdf8; font-mono: true; margin-bottom: 12px; }
          .title { font-size: 14px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; margin-bottom: 8px; }
          .slide-name { font-size: 20px; font-weight: 700; color: #f1f5f9; margin-bottom: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
          .notes-box { font-size: 18px; line-height: 1.6; color: #e2e8f0; background: #090d16; padding: 16px; border-radius: 8px; flex: 1; overflow-y: auto; border: 1px solid #334155; }
        </style>
      </head>
      <body>
        <div class="panel">
          <div class="timer" id="timer">00:00:00</div>
          <div class="title">当前页 (<span id="pageNum">1/1</span>)</div>
          <div class="slide-name" id="curTitle">-</div>
          <div class="title">讲稿备注</div>
          <div class="notes-box" id="notes">加载中...</div>
        </div>
        <div class="panel">
          <div class="title">下一页预览: <span id="nextTitle" style="color:#f1f5f9; font-weight:700; text-transform:none;">-</span></div>
          <div style="flex:1; position:relative; overflow:hidden; border-radius:8px; border:1px solid #334155; background:#000; margin-top:8px;" id="previewWrapper">
            <iframe id="nextPreview" src="" style="position:absolute; left:0; top:0; width:1920px; height:1080px; transform-origin:0 0; border:none; pointer-events:none;"></iframe>
          </div>
        </div>
        <script>
          let seconds = 0;
          setInterval(() => {
            seconds++;
            const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').textContent = h + ':' + m + ':' + s;
          }, 1000);
          
          const iframe = document.getElementById('nextPreview');
          const wrapper = document.getElementById('previewWrapper');
          function resizePreview() {
            const f = Math.min(wrapper.clientWidth / 1920, wrapper.clientHeight / 1080);
            iframe.style.transform = 'scale(' + f + ')';
          }
          window.addEventListener('resize', resizePreview);
          setTimeout(resizePreview, 100);

          const deckUrl = "${deckUrl}";
          const bc = new BroadcastChannel('deck-speaker-sync');
          bc.onmessage = (e) => {
            const d = e.data;
            if (d.action === 'go') return;
            document.getElementById('pageNum').textContent = d.slideIndex + '/' + d.totalSlides;
            document.getElementById('curTitle').textContent = d.currentTitle;
            document.getElementById('nextTitle').textContent = d.nextTitle;
            document.getElementById('notes').innerHTML = d.notes;
            
            const targetUrl = deckUrl + '#' + d.nextSlideId;
            if (!iframe.src || iframe.src === window.location.href) {
              iframe.src = targetUrl;
            } else if (iframe.contentWindow) {
              iframe.contentWindow.location.replace(targetUrl);
            }
          };
          
          document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); bc.postMessage({action: 'go', dir: 1}); }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); bc.postMessage({action: 'go', dir: -1}); }
          });
        <\/script>
      </body>
      </html>
    `);
    setTimeout(broadcastSpeakerState, 300);
  }

  function jump(i) {
    if(N === 0) return;
    slides[cur].classList.remove('active');
    nav.children[cur].classList.remove('on');
    cur = (i + N) % N;
    slides[cur].classList.add('active');
    nav.children[cur].classList.add('on');
    document.getElementById('pageNum').textContent = (cur + 1) + ' / ' + N;
    history.replaceState(null, '', '#' + slides[cur].id);
    updateViewportBg();
    broadcastSpeakerState();
    setTimeout(resizeECharts, 50);
    setTimeout(resizeECharts, 350);
  }
  function go(d) { jump(cur + d); }
  function toggleFs() {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); go(-1); }
    if (e.key === 'Home') { e.preventDefault(); jump(0); }
    if (e.key === 'End') { e.preventDefault(); jump(N - 1); }
    if (e.key === 'f' || e.key === 'F') toggleFs();
    if (e.key === 's' || e.key === 'S') openSpeakerView();
  });
  let tx = 0;
  document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
  document.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - tx; if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1); });
  function updateViewportBg() {
    if (!slides || slides.length === 0) return;
    const curSlide = slides[cur];
    const isCover = curSlide.querySelector('.cover-bg') !== null;
    let bg = '#fff';
    if (isCover) {
      bg = 'var(--cover-bg)';
    } else {
      const computed = window.getComputedStyle(curSlide);
      bg = (computed.backgroundImage && computed.backgroundImage !== 'none')
        ? computed.backgroundImage
        : (computed.backgroundColor || '#fff');
    }
    document.documentElement.style.setProperty('--viewport-bg', bg);
  }

  // ECharts Auto Initializer
  const echartsInstances = [];
  function initECharts() {
    if (typeof echarts === 'undefined') return;
    const elements = document.querySelectorAll('.echart-box, .echarts');
    elements.forEach(el => {
      if (el.dataset.echartsInited === 'true') return;
      let optionObj = null;
      if (el.dataset && el.dataset.option) {
        try { optionObj = JSON.parse(el.dataset.option); } catch(e) { console.error('ECharts JSON parse error:', e); }
      } else {
        const txt = el.textContent.trim();
        if (txt) {
          try { optionObj = JSON.parse(txt); } catch(e) { console.error('ECharts JSON parse error:', e); }
        }
      }
      if (optionObj) {
        let container = el;
        if (el.tagName.toLowerCase() === 'pre') {
          container = document.createElement('div');
          container.className = el.className;
          container.style.cssText = el.style.cssText || 'width:100%; height:380px;';
          el.parentNode.replaceChild(container, el);
        }
        if (!container.style.height) container.style.height = '380px';
        if (!container.style.width) container.style.width = '100%';
        if (!optionObj.backgroundColor) optionObj.backgroundColor = 'transparent';
        
        const chart = echarts.init(container, 'dark');
        chart.setOption(optionObj);
        container.dataset.echartsInited = 'true';
        echartsInstances.push(chart);
      }
    });
  }

  function resizeECharts() {
    initECharts();
    echartsInstances.forEach(chart => {
      try { chart.resize(); } catch(e) {}
    });
  }

  // Auto init Markdown, Highlight.js, Mermaid, ECharts
  window.addEventListener('DOMContentLoaded', () => {
    // Markdown
    if (typeof marked !== 'undefined') {
      document.querySelectorAll('.markdown').forEach(el => {
        el.innerHTML = marked.parse(el.textContent.trim());
      });
    }
    // Highlight.js
    if (typeof hljs !== 'undefined') {
      document.querySelectorAll('pre code, .code-block').forEach(el => {
        hljs.highlightElement(el);
      });
    }
    // Mermaid
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    }
    // ECharts
    initECharts();
  });

  // Restore position from the URL hash (e.g. deck.html#s3) so a refresh keeps the current slide.
  const hm = location.hash.match(/^#s(\d+)$/);
  if (hm && N > 0) jump(Math.min(Math.max(parseInt(hm[1], 10) - 1, 0), N - 1));
  else if(N > 0) {
    document.getElementById('pageNum').textContent = '1 / ' + N;
    updateViewportBg();
    broadcastSpeakerState();
  }
  // Remove the watermark element if the placeholder was cleared instead of deleted.
  const wmEl = document.querySelector('.watermark');
  if (wmEl && !wmEl.textContent.trim()) wmEl.remove();
</script>
</body>
</html>
